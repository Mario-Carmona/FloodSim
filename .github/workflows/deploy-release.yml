name: Deploy release

on:
  workflow_dispatch:

permissions:
  contents: write
  actions: write

jobs:
  check-tag:
    runs-on: ubuntu-latest
    steps:
      # 🔹 Checkout repository again to prepare for tagging and release
      - uses: actions/checkout@v4

      # 🧑‍💻 Configure a Git user for tagging and pushing
      - name: Setup git user
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"

      # 🏷️ Create a unique tag based on the current date (e.g., v2025.10.30)
      - name: Check tag availability
        run: |
          VERSION=$(date +'%Y.%m.%d')
          TAG="v${VERSION}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
              echo "❌ Error: The tag '$TAG' already exists." >&2
              exit 1
          fi 

  # ======================================================
  # 1️⃣ Check/Restore: Detectamos si el vcpkg.json ha cambiado
  # ======================================================
  check-cache:
    needs: [check-tag]
    runs-on: ubuntu-latest
    outputs:
      matrix_full: ${{ steps.set-matrix.outputs.matrix_full }}
      matrix_missing: ${{ steps.set-matrix.outputs.matrix_missing }}
      any_missing: ${{ steps.set-matrix.outputs.any_missing }}
      vcpkg_hash: ${{ steps.set-matrix.outputs.vcpkg_hash }}
    steps:
      - uses: actions/checkout@v4
  
      - name: Generate Matrices
        id: set-matrix
        shell: pwsh
        run: |
          # 1. Leer el archivo y normalizarlo (quitar todos los saltos de línea y espacios extra)
          # Esto garantiza que el hash sea idéntico en Windows (CRLF) y Linux (LF)
          $rawContent = Get-Content "vcpkg.json" -Raw
          $normalizedContent = $rawContent -replace "`r`n", "`n" # Normaliza a LF
          
          # Generar SHA256 del contenido normalizado
          $sha256 = [System.Security.Cryptography.SHA256]::Create()
          $contentBytes = [System.Text.Encoding]::UTF8.GetBytes($normalizedContent)
          $hashBytes = $sha256.ComputeHash($contentBytes)
          $vcpkgHash = ($hashBytes | ForEach-Object { $_.ToString("x2") }) -join ""

          Write-Host "Normlized Hash (vcpkg.json): $vcpkgHash"

          $os_configs = @(
            @{ 
              os="windows-2025-vs2026"; 
              build_preset="windows-full-suite-release"; 
              run_install_deps=$false
            },
            @{ 
              os="ubuntu-24.04"; 
              build_preset="linux-full-suite-release"; 
              run_install_deps=$true
            },
            @{ 
              os="ubuntu-22.04"; 
              build_preset="linux-full-suite-release"; 
              run_install_deps=$true
            }
          )

          $missing = @()
          foreach ($c in $os_configs) {
            $key = "vcpkg-$($c.os)-$vcpkgHash"
            $cacheExists = try { gh cache list --key "$key" --limit 1 | Select-String "$key" } catch { $null }
            
            if (-not $cacheExists) {
              $missing += $c
              Write-Host "❌ Cache missing for OS: $($c.os)"
            } else {
              Write-Host "✅ Cache hit for OS: $($c.os)"
            }
          }

          # 🛠️ FORMA CORRECTA DE SETEAR OUTPUTS EN PWSH
          $json_full = $os_configs | ConvertTo-Json -Compress
          $json_missing = $missing | ConvertTo-Json -Compress
          
          # Si no hay nada perdido, enviamos un array con un objeto vacío "dummy" o manejamos el skip
          $any_missing = if ($missing.Count -gt 0) { "true" } else { "false" }
          if ($missing.Count -eq 0) { $json_missing = "[]" }

          "matrix_full=$json_full" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "matrix_missing=$json_missing" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "any_missing=$any_missing" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "vcpkg_hash=$vcpkgHash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  build-new-cache:
    needs: check-cache
    if: needs.check-cache.outputs.any_missing == 'true'
    strategy:
      fail-fast: true
      matrix:
        include: ${{ fromJson(needs.check-cache.outputs.matrix_missing) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # 🔹 PASO PREVIO: Solo se ejecuta si run_install_deps es true
      - name: Install system dependencies (Linux only)
        if: matrix.run_install_deps == true
        run: bash install-deps.sh --desktop
        shell: bash

      - name: Restore Cache (Try to get partial)
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ contains(matrix.os, 'windows') && 'build/Windows/vcpkg_installed' || 'build/Linux/vcpkg_installed' }}
            ${{ contains(matrix.os, 'windows') && 'build/Windows/vcpkg_cache' || 'build/Linux/vcpkg_cache' }}
          key: vcpkg-${{ matrix.os }}-${{ needs.check-cache.outputs.vcpkg_hash }}
          restore-keys: vcpkg-${{ matrix.os }}-

      - name: Build Full Suite to populate cache
        run: cmake --workflow --preset ${{ matrix.build_preset }}
        shell: pwsh

      - name: Save Cache
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ contains(matrix.os, 'windows') && 'build/Windows/vcpkg_installed' || 'build/Linux/vcpkg_installed' }}
            ${{ contains(matrix.os, 'windows') && 'build/Windows/vcpkg_cache' || 'build/Linux/vcpkg_cache' }}
          key: vcpkg-${{ matrix.os }}-${{ needs.check-cache.outputs.vcpkg_hash }}

  build-parallel:
    needs: [check-cache, build-new-cache]
    if: |
      always() && 
      needs.check-tag.result == 'success' &&
      needs.check-cache.result == 'success' &&
      (needs.build-new-cache.result == 'success' || needs.build-new-cache.result == 'skipped')
    strategy:
      matrix:
        # Aquí definimos todos los paquetes que queremos generar por OS
        include:
          - os: windows-2025-vs2026
            preset: windows-pack-desktop
            run_install_deps: false
            artifact_path: "installer/*.msi"
          - os: windows-2025-vs2026
            preset: windows-pack-server
            run_install_deps: false
            artifact_path: "installer/*.msi"
          - os: ubuntu-24.04
            preset: linux-pack-desktop
            run_install_deps: true
            artifact_path: "installer/*.deb"
          - os: ubuntu-24.04
            preset: linux-pack-server
            run_install_deps: true
            artifact_path: "installer/*.deb"
          - os: ubuntu-22.04
            preset: linux-pack-desktop
            run_install_deps: true
            artifact_path: "installer/*.deb"
          - os: ubuntu-22.04
            preset: linux-pack-server
            run_install_deps: true
            artifact_path: "installer/*.deb"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # 🔹 También lo incluimos aquí para el job de empaquetado
      - name: Install system dependencies (Linux only)
        if: matrix.run_install_deps == true
        run: bash install-deps.sh --desktop
        shell: bash

      - name: Restore Cache (Try to get partial)
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ contains(matrix.os, 'windows') && 'build/Windows/vcpkg_installed' || 'build/Linux/vcpkg_installed' }}
            ${{ contains(matrix.os, 'windows') && 'build/Windows/vcpkg_cache' || 'build/Linux/vcpkg_cache' }}
          key: vcpkg-${{ matrix.os }}-${{ needs.check-cache.outputs.vcpkg_hash }}
          fail-on-cache-miss: true # Opcional: asegura que la cache del job anterior esté ahí

      - name: Build to populate cache
        run: cmake --workflow --preset ${{ matrix.preset }}
        shell: pwsh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          # Usamos el nombre específico definido en la matriz para evitar conflictos
          name: ${{ matrix.os }}-${{ matrix.preset }}-installer
          # El path buscará .msi en Windows y .deb en Linux según lo definido
          path: ${{ matrix.artifact_path }}

  release:
    # 🚀 Run only after the Windows builds complete
    needs: [build-parallel]
    runs-on: ubuntu-latest
    steps:
      # ⬇️ Download all installer artifacts from previous job
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: all-installers

      # 🏷️ Create a unique tag based on the current date (e.g., v2025.10.30)
      - name: Create tag name
        id: tag
        run: |
          VERSION=$(date +'%Y.%m.%d')
          echo "TAG=v${VERSION}" >> $GITHUB_ENV
      
      # 🧾 Create a draft GitHub release and attach installer files
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "Release ${{ env.TAG }}"
          files: |
            all-installers/**/*.msi
            all-installers/**/*.deb
          draft: true # La crea como borrador para que tú la revises antes de publicar
          prerelease: false
          generate_release_notes: true # GitHub generará automáticamente el registro de cambios
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}