name: Deploy Release

on:
  workflow_dispatch: # Allows manual triggering from the GitHub Actions tab
  push:
    branches: ["main"]

permissions:
  contents: write   # Required for creating releases and tags
  actions: write    # Required for querying and managing GitHub Caches via 'gh' CLI
  pages: write      # NUEVO: Requerido para publicar en GitHub Pages
  id-token: write   # NUEVO: Requerido para la autenticación OIDC de deploy-pages

jobs:
  # ======================================================
  # 1️) Check Tag: Prevent duplicate releases
  # ======================================================  
  check-tag:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup git user
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          
      - name: Check tag availability
        run: |
          VERSION=$(date +'%Y.%m.%d')
          TAG="v${VERSION}"
          if git ls-remote --tags origin "$TAG" | grep -q "$TAG"; then
              echo "❌ Error: The tag '$TAG' already exists." >&2
              exit 1
          fi 

  # ======================================================
  # 2️) Check Cache: Orchestrate dynamic build matrix
  # ======================================================
  check-cache:
    needs: [check-tag]
    runs-on: ubuntu-latest
    outputs:
      matrix_full: ${{ steps.set-matrix.outputs.matrix_full }}
      matrix_missing: ${{ steps.set-matrix.outputs.matrix_missing }}
      any_missing: ${{ steps.set-matrix.outputs.any_missing }}
      vcpkg_hash: ${{ steps.set-matrix.outputs.vcpkg_hash }}
    steps:
      - uses: actions/checkout@v4
  
      - name: Generate Build Matrices
        id: set-matrix
        shell: pwsh
        run: |
          # 💡 NORMALIZE HASH: Read vcpkg.json and force LF line endings.
          # This ensures the hash is identical whether the file was checked out on Windows (CRLF) or Linux (LF).
          $rawContent = Get-Content "vcpkg.json" -Raw
          $normalizedContent = $rawContent -replace "`r`n", "`n" # Normaliza a LF
          
          $sha256 = [System.Security.Cryptography.SHA256]::Create()
          $contentBytes = [System.Text.Encoding]::UTF8.GetBytes($normalizedContent)
          $hashBytes = $sha256.ComputeHash($contentBytes)
          $vcpkgHash = ($hashBytes | ForEach-Object { $_.ToString("x2") }) -join ""

          Write-Host "Normlized Hash (vcpkg.json): $vcpkgHash"

          # Define the OS configurations. 
          # 'build_preset' is used only for populating the cache (Configure step).
          $os_configs = @(
            @{ 
              os="windows-2025-vs2026"; 
              build_cache_preset="windows-full-suite-release"; 
              run_install_deps=$false
            },
            @{ 
              os="ubuntu-24.04"; 
              build_cache_preset="linux-full-suite-release"; 
              run_install_deps=$true
            },
            @{ 
              os="ubuntu-22.04"; 
              build_cache_preset="linux-full-suite-release"; 
              run_install_deps=$true
            }
          )

          $missing = @()
          foreach ($c in $os_configs) {
            $key = "vcpkg-$($c.os)-$vcpkgHash"
            $cacheExists = try { gh cache list --key "$key" --limit 1 | Select-String "$key" } catch { $null }
            
            if (-not $cacheExists) {
              $missing += $c
              Write-Host "❌ Cache missing for OS: $($c.os)"
            } else {
              Write-Host "✅ Cache hit for OS: $($c.os)"
            }
          }

          # 🚀 DYNAMIC MATRIX: Prepare JSON strings for GitHub Actions matrix
          $json_full = $os_configs | ConvertTo-Json -Compress
          # Ensure $missing is treated as an array even if it has 1 element using the comma operator
          $json_missing = if ($missing.Count -gt 0) { ,$missing | ConvertTo-Json -Compress } else { "[]" }
          $any_missing = if ($missing.Count -gt 0) { "true" } else { "false" }

          # Append to GITHUB_OUTPUT using UTF8 to avoid encoding issues in Actions
          "matrix_full=$json_full" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "matrix_missing=$json_missing" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "any_missing=$any_missing" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
          "vcpkg_hash=$vcpkgHash" | Out-File -FilePath $env:GITHUB_OUTPUT -Append -Encoding utf8
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # ======================================================
  # 3️) Build New Cache: Seed the cache if missing
  # ======================================================
  build-new-cache:
    needs: check-cache
    # Only run if at least one OS configuration is missing its cache
    if: needs.check-cache.outputs.any_missing == 'true'
    strategy:
      fail-fast: true
      matrix:
        # Use the filtered matrix containing only missing configurations
        include: ${{ fromJson(needs.check-cache.outputs.matrix_missing) }}
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Install system dependencies (Linux)
        if: matrix.run_install_deps == true
        run: bash ./install-deps.sh --desktop
        shell: bash

      - name: Restore OS Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ contains(matrix.os, 'windows') && 'build/Windows/vcpkg_installed' || 'build/Linux/vcpkg_installed' }}
            ${{ contains(matrix.os, 'windows') && 'build/Windows/vcpkg_cache' || 'build/Linux/vcpkg_cache' }}
          key: vcpkg-${{ matrix.os }}-${{ needs.check-cache.outputs.vcpkg_hash }}
          restore-keys: vcpkg-${{ matrix.os }}-

      - name: Install vcpkg dependencies (Configure only)
        # Running 'configure' is enough to trigger vcpkg installation without building the whole project
        run: cmake --preset ${{ matrix.build_cache_preset }}
        shell: pwsh

      - name: Save OS Cache
        uses: actions/cache/save@v4
        with:
          path: |
            ${{ contains(matrix.os, 'windows') && 'build/Windows/vcpkg_installed' || 'build/Linux/vcpkg_installed' }}
            ${{ contains(matrix.os, 'windows') && 'build/Windows/vcpkg_cache' || 'build/Linux/vcpkg_cache' }}
          key: vcpkg-${{ matrix.os }}-${{ needs.check-cache.outputs.vcpkg_hash }}

  # ======================================================
  # 4️) Build Parallel: Generate final installers
  # ======================================================
  build-parallel:
    needs: [check-cache, build-new-cache]
    # Execute if the check was successful, even if the 'seed' job was skipped (cache hit)
    if: |
      always() && 
      needs.check-tag.result == 'success' &&
      needs.check-cache.result == 'success' &&
      (needs.build-new-cache.result == 'success' || needs.build-new-cache.result == 'skipped')
    strategy:
      matrix:
        # Use the full matrix to generate all requested installers (Desktop, Server, etc.)
        include:
          - os: windows-2025-vs2026
            preset: windows-pack-desktop
            run_install_deps: false
            artifact_path: "installer/*.msi"
          - os: windows-2025-vs2026
            preset: windows-pack-server
            run_install_deps: false
            artifact_path: "installer/*.msi"
          - os: ubuntu-24.04
            preset: linux-pack-desktop
            run_install_deps: true
            artifact_path: "installer/*.deb"
          - os: ubuntu-24.04
            preset: linux-pack-server
            run_install_deps: true
            artifact_path: "installer/*.deb"
          - os: ubuntu-22.04
            preset: linux-pack-desktop
            run_install_deps: true
            artifact_path: "installer/*.deb"
          - os: ubuntu-22.04
            preset: linux-pack-server
            run_install_deps: true
            artifact_path: "installer/*.deb"
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive
          
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install system dependencies (Linux)
        if: matrix.run_install_deps == true
        run: bash ./install-deps.sh --desktop
        shell: bash

      - name: Restore OS Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            ${{ contains(matrix.os, 'windows') && 'build/Windows/vcpkg_installed' || 'build/Linux/vcpkg_installed' }}
            ${{ contains(matrix.os, 'windows') && 'build/Windows/vcpkg_cache' || 'build/Linux/vcpkg_cache' }}
          key: vcpkg-${{ matrix.os }}-${{ needs.check-cache.outputs.vcpkg_hash }}
          fail-on-cache-miss: true

      - name: Build and Package
        run: cmake --workflow --preset ${{ matrix.preset }}
        shell: pwsh

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.preset }}-installer
          path: ${{ matrix.artifact_path }}

  # ======================================================
  # 5️) Release: Create GitHub Draft Release
  # ======================================================
  release:
    needs: [build-parallel]
    runs-on: ubuntu-latest
    # Ensure release runs if parallel builds were successful, regardless of caching jobs
    if: |
      always() && 
      needs.build-parallel.result == 'success'
    steps:
      - name: Download installers
        uses: actions/download-artifact@v4
        with:
          path: all-installers
          
      - name: Create tag name
        id: tag
        run: |
          VERSION=$(date +'%Y.%m.%d')
          echo "TAG=v${VERSION}" >> $GITHUB_ENV
      
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG }}
          name: "Release ${{ env.TAG }}"
          files: |
            all-installers/**/*.msi
            all-installers/**/*.deb
          draft: true 
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  docs:
    needs: [release]
    runs-on: ubuntu-22.04
    if: |
      always() && 
      needs.release.result == 'success'
    steps:
      - name: Checkout del código
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Instalar Doxygen
        run: sudo apt-get update && sudo apt-get install -y doxygen

      - name: Setup cmake
        uses: jwlawson/actions-setup-cmake@v2
        with:
          cmake-version: '4.1.1'

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: '3.10'

      - name: Install system dependencies (Linux)
        run: bash ./install-deps.sh --desktop
        shell: bash

      - name: Restore OS Cache
        uses: actions/cache/restore@v4
        with:
          path: |
            build/Linux/vcpkg_installed
            build/Linux/vcpkg_cache
          key: vcpkg-ubuntu-22.04-${{ needs.check-cache.outputs.vcpkg_hash }}
          fail-on-cache-miss: true

      - name: Generar la web (Target docs)
        run: cmake --workflow --preset docs-linux

      - name: Preparar artefacto de Pages
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/html # La carpeta exacta donde Doxygen genera el HTML

      - name: Desplegar web en GitHub Pages
        uses: actions/deploy-pages@v4
