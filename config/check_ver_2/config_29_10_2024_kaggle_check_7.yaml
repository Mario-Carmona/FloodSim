logging:
  level: Info
  async: false
  silent: false
  save_log_file: true
scenario:
  name: scenario_29_10_2024
  output_dir: /kaggle/working
  append_start_timestamp: false
simulation:
  start_timestamp: 2024-10-29T20:15:00
  time_step: 00:00:01
  duration: 00:01:00
  view_box:
    use_full_grid: true
    south_west:
      lon: 6.9514835638837246e-310
      lat: 6.3240402667679558e-322
    north_east:
      lon: 0
      lat: 6.9527137952879271e-310
state_updater:
  enable_rainfall: true
  dry_tolerance: 0.00100000005
  flood_risk:
    default_level:
      name: Dry
      color_hex: F5DEB3FF
    levels:
      - name: Level 1
        threshold_start: 0.200000003
        color_hex: "#FFF176FF"
      - name: Level 2
        threshold_start: 0.400000006
        color_hex: "#FFD54FFF"
      - name: Level 3
        threshold_start: 0.600000024
        color_hex: "#FFB74DFF"
      - name: Level 4
        threshold_start: 0.800000012
        color_hex: "#FFA726FF"
      - name: Level 5
        threshold_start: 1
        color_hex: "#FF8A65FF"
      - name: Level 6
        threshold_start: 1.20000005
        color_hex: "#FF7043FF"
      - name: Level 7
        threshold_start: 1.39999998
        color_hex: "#F4511EFF"
      - name: Level 8
        threshold_start: 1.60000002
        color_hex: "#E64A19FF"
      - name: Level 9
        threshold_start: 1.79999995
        color_hex: "#D84315FF"
      - name: Level 10
        threshold_start: 2
        color_hex: "#E53935FF"
      - name: Level 11
        threshold_start: 2.5
        color_hex: "#C62828FF"
      - name: Level 12
        threshold_start: 3.5
        color_hex: "#B71C1CFF"
      - name: Level 13
        threshold_start: 5
        color_hex: "#880E4FFF"
      - name: Level 14
        threshold_start: 8
        color_hex: "#4A148CFF"
      - name: Level 15
        threshold_start: 12
        color_hex: "#1A001AFF"
  updater:
    type: Onnx
    model_path: /usr/share/floodsim/exported_models/first_model_cpu
    tensor_dim: 16
input:
  file:
    dataset_folder: /kaggle/working/data
    dataset_name: data_29_10_2024_check_7
    static_format: Idrisi
    dynamic_format: Hif
  scalars:
    fluid_density: 1000.0
    fluid_viscosity: 0.001
output:
  snapshot:
    every_n_steps: 1
  outputs:
    - type: Mqtt
      protocol: mqtt://
      host: 127.0.0.1
      port: 1883
      format: Json
      send_initial_state: false
    - type: Checkpoint
      static_format: Idrisi