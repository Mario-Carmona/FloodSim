scenario:
  output_dir: ../outputs
  name: scenario_29_10_2024
  append_start_timestamp: false

logging:
  level: debug
  async: false
  silent: false
  save_log_file: true

input:
  file:
    static_format: IDRISI
    dynamic_format: HIF
    dataset_name: data_29_10_2024
  scalars:
    - name: fluid_density
      value: 1000.0
    - name: fluid_viscosity
      value: 0.001

output:
  snapshot:
    every_n_steps: 10
  outputs:
    - type: image

state_updater:
  enable_rainfall: true
  dry_tolerance: 0.001
  flood_risk:
    default_level:
      name: Dry
      color_hex: F5DEB3FF
    levels:
      - name: Very Shallow
        threshold_start: 0.001
        color_hex: E0F3F8FF
      - name: Low Depth
        threshold_start: 0.1
        color_hex: 87CEEBFF
      - name: Medium Depth
        threshold_start: 0.3
        color_hex: 1E90FFFF
      - name: High Depth
        threshold_start: 1.0
        color_hex: 0000CDFF
      - name: Extreme Depth
        threshold_start: 2.0
        color_hex: 4B0082FF
  updater:
    type: onnx
    model_path: ../exported_models/first_model_cpu
    tensor_dim: 16

simulation:
  start_timestamp: 2024-10-29T10:00:00
  time_step: 00:00:01
  duration: 08:00:00
  view_box: 
    use_full_grid: true
    south_west:
      lon: -0.78291248
      lat: 39.32434531
    north_east:
      lon: -0.22811569
      lat: 39.56367382