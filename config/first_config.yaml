scenario:
  name: first_data_1

logging:
  level: info
  async: true
  silent: false
  file: simulation.log

input:
  type: file
  path: ../../../data/first_data

output:
  snapshot:
    every_n_steps: 1
  outputs:
    - type: mqtt
      address: tcp://localhost:1883
      topic: danasim/updates
      client_id: Simulation_Publisher_Node
      qos: 1
      format: protobuf

state_updater:
  type: experimental

simulation:
  time_step: 1.0
  total_time: 20.0